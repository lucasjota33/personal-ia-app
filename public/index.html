<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halter AI — Personal Trainer IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card surface">
      <!-- Brand -->
      <div class="brand">
        <img src="/static/logo.png" alt="Halter AI" class="brand-logo" />
        <h1>Halter AI</h1>
        <p>O seu Personal Trainer inteligente. Treino, dieta e suplementação gerados por IA.</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-target="login-form">Entrar</button>
        <button class="auth-tab" data-target="register-form">Criar Conta</button>
      </div>

      <!-- Login -->
      <form id="login-form" class="auth-form active" novalidate>
        <div class="field">
          <label for="login-username">Utilizador ou E-mail</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="o seu nome de utilizador" />
        </div>
        <div class="field">
          <label for="login-password">Palavra-passe</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="button" id="login-button" class="btn btn-primary btn-full">Acessar a Plataforma</button>
      </form>

      <!-- Register -->
      <form id="register-form" class="auth-form" novalidate>
        <div class="field">
          <label for="register-username">Nome de Utilizador</label>
          <input type="text" id="register-username" autocomplete="username" placeholder="ex: joao_silva" />
        </div>
        <div class="field">
          <label for="register-email">E-mail</label>
          <input type="email" id="register-email" autocomplete="email" placeholder="email@exemplo.com" />
        </div>
        <div class="field">
          <label for="register-password">Palavra-passe</label>
          <input type="password" id="register-password" autocomplete="new-password" placeholder="mínimo 8 caracteres" />
        </div>
        <div class="field">
          <label for="register-password-confirm">Confirmar Palavra-passe</label>
          <input type="password" id="register-password-confirm" autocomplete="new-password" placeholder="repita a palavra-passe" />
        </div>
        <button type="button" id="register-button" class="btn btn-primary btn-full">Criar Conta</button>
      </form>

      <div id="auth-feedback" class="feedback" role="alert"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/script.js"></script>
</body>
</html>
