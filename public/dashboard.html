<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halter AI — Painel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="page-header">
      <div class="logo-row">
        <img src="/static/logo.png" alt="Halter AI" />
        <div>
          <h1>Halter AI</h1>
          <p>Os seus planejamentos personalizados</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost btn-sm" id="logout-button">Sair</button>
      </div>
    </header>

    <!-- Profiles list -->
    <div class="section-label">Planejamentos Criados</div>
    <div class="profiles-grid" id="profiles-list">
      <!-- populated by JS -->
    </div>

    <div class="section-divider"></div>

    <!-- New profile form -->
    <div class="section-label">Novo Planejamento</div>
    <div class="surface form-section">
      <div class="grid-form">
        <div class="field">
          <label for="profile-name">Nome do Perfil</label>
          <input type="text" id="profile-name" placeholder="ex: Lucas Barbosa" />
        </div>
        <div class="field">
          <label for="profile-age">Idade</label>
          <input type="number" id="profile-age" min="12" max="100" value="25" />
        </div>
        <div class="field">
          <label for="profile-gender">Sexo</label>
          <select id="profile-gender">
            <option>Masculino</option>
            <option>Feminino</option>
            <option>Outro</option>
          </select>
        </div>
        <div class="field">
          <label for="profile-weight">Peso (kg)</label>
          <input type="number" id="profile-weight" step="0.1" value="75" />
        </div>
        <div class="field">
          <label for="profile-height">Altura (cm)</label>
          <input type="number" id="profile-height" min="100" max="230" value="175" />
        </div>
        <div class="field">
          <label for="profile-allergies">Alergias / Restrições</label>
          <input type="text" id="profile-allergies" placeholder="Nenhuma" />
        </div>
        <div class="field">
          <label for="profile-goal">Objetivo Principal</label>
          <select id="profile-goal">
            <option>Ganhar Massa Muscular (Hipertrofia)</option>
            <option>Perder Peso (Déficit Calórico)</option>
            <option>Melhorar Performance (Força/Resistência)</option>
            <option>Definição Corporal</option>
            <option>Manutenção da Saúde</option>
          </select>
        </div>
        <div class="field">
          <label for="profile-activity">Nível de Atividade</label>
          <select id="profile-activity">
            <option>Sedentário (Trabalho de escritório, sem exercícios)</option>
            <option>Levemente Ativo (1 a 3 dias de exercício/semana)</option>
            <option>Moderadamente Ativo (3 a 5 dias de exercício/semana)</option>
            <option>Muito Ativo (6 a 7 dias de exercício intenso/semana)</option>
            <option>Extremamente Ativo (Atleta profissional, treinos duplos)</option>
          </select>
        </div>
      </div>
      <button id="create-profile-button" class="btn btn-primary" style="margin-top:20px">Gerar Planejamento</button>
      <div id="dashboard-feedback" class="feedback" role="alert"></div>
    </div>

  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">A gerar o seu planejamento com IA...</p>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="/static/script.js"></script>
</body>
</html>
