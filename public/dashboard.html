<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halter AI - Painel</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="page-header">
      <div>
        <h1>Painel de Perfis</h1>
        <p>Gerencie os seus planejamentos e crie novos perfis personalizados.</p>
      </div>
      <button class="secondary-button" id="logout-button">Sair</button>
    </header>

    <section class="profile-grid" id="profiles-list"></section>

    <section class="card form-card">
      <h2>Novo Planejamento</h2>
      <div class="grid-2">
        <label>Nome do Perfil<input type="text" id="profile-name" /></label>
        <label>Idade<input type="number" id="profile-age" min="12" max="100" value="25" /></label>
        <label>Sexo<select id="profile-gender"><option>Masculino</option><option>Feminino</option><option>Outro</option></select></label>
        <label>Peso (kg)<input type="number" id="profile-weight" step="0.1" value="75" /></label>
        <label>Altura (cm)<input type="number" id="profile-height" min="100" max="230" value="175" /></label>
        <label>Alergias<input type="text" id="profile-allergies" placeholder="Nenhuma" /></label>
        <label>Objetivo<select id="profile-goal"><option>Ganhar Massa Muscular (Hipertrofia)</option><option>Perder Peso (Déficit Calórico)</option><option>Melhorar Performance (Força/Resistência)</option><option>Definição Corporal</option><option>Manutenção da Saúde</option></select></label>
        <label>Nível de Atividade<select id="profile-activity"><option>Sedentário (Trabalho de escritório, sem exercícios)</option><option>Levemente Ativo (1 a 3 dias de exercício/semana)</option><option>Moderadamente Ativo (3 a 5 dias de exercício/semana)</option><option>Muito Ativo (6 a 7 dias de exercício intenso/semana)</option><option>Extremamente Ativo (Atleta profissional, treinos duplos)</option></select></label>
      </div>
      <button id="create-profile-button" class="primary-button">Gerar Planejamento</button>
      <div id="dashboard-feedback" class="feedback"></div>
    </section>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
